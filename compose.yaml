services:
  resource-db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: resource_db
      POSTGRES_USER: Postgre
      POSTGRES_PASSWORD: admin
    ports:
      - "5432:5432"
    volumes:
      - resource_pgdata:/var/lib/postgresql/data
  song-db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: song_db
      POSTGRES_USER: Postgre
      POSTGRES_PASSWORD: admin
    ports:
      - "5434:5432"
    volumes:
      - song_pgdata:/var/lib/postgresql/data
volumes:
  resource_pgdata:
  song_pgdata: